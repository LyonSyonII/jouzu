<svg
  xmlns="http://www.w3.org/2000/svg"
  version="1.1"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="1000"
  height="1000"
>
  <metadata>
    <rdf:RDF
      xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
      xmlns:dc="http://purl.org/dc/elements/1.1/"
      ><rdf:Description
        ><dc:creator>RealFaviconGenerator</dc:creator
        ><dc:source>https://realfavicongenerator.net</dc:source></rdf:Description
      ></rdf:RDF
    >
  </metadata>
  <style>
    #light-icon {
      display: inline;
    }
    #dark-icon {
      display: none;
    }

    @media (prefers-color-scheme: dark) {
      #light-icon {
        display: none;
      }
      #dark-icon {
        display: inline;
      }
    }
  </style>
  <g id="light-icon">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      version="1.1"
      xmlns:xlink="http://www.w3.org/1999/xlink"
      width="1000"
      height="1000"
    >
      <g>
        <g transform="matrix(2,0,0,2,0,250)">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            version="1.1"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            width="500"
            height="250"
            viewBox="0 0 500 250"
          >
            <image
              width="500"
              height="250"
              xlink:href="data:image/png;base64,"
            ></image>
          </svg>
        </g>
      </g>
    </svg>
  </g>
  <g id="dark-icon">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      version="1.1"
      xmlns:xlink="http://www.w3.org/1999/xlink"
      width="1000"
      height="1000"
    >
      <g>
        <g transform="matrix(2,0,0,2,0,250)">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            version="1.1"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            width="500"
            height="250"
            viewBox="0 0 500 250"
          >
            <image
              width="500"
              height="250"
              xlink:href="data:image/png;base64,"
            ></image>
          </svg>
        </g>
      </g>
    </svg>
  </g>
</svg>
