<main>
  <nav>
    <h1>
      <ruby>上手<rt>じょうず</rt></ruby>
    </h1>

    <p-button
      size="large"
      [icon]="this.themeService.isDarkMode() ? PrimeIcons.SUN : PrimeIcons.MOON"
      (onClick)="this.themeService.toggleDarkMode()"
    />
  </nav>

  <div>
    <x-card
      header="かな・カナ"
      divider
      [tooltip]="{
        text: 'kana',
        options: romanizeTooltip,
      }"
    >
      <section>
        <h3 pTooltip="hiragana" [tooltipOptions]="romanizeTooltip">ひらがな</h3>
        <ng-container
          *ngTemplateOutlet="charTable; context: { chars: hiraganaSelected() }"
        />
      </section>

      <p-divider layout="vertical" />

      <section>
        <h3 pTooltip="katakana" [tooltipOptions]="romanizeTooltip">カタカナ</h3>
        <ng-container
          *ngTemplateOutlet="charTable; context: { chars: katakanaSelected() }"
        />
      </section>
    </x-card>
  </div>
</main>

<p-toast />

<ng-template #charTable let-_chars="chars">
  @let selectedRows = asSelectedChars(_chars);
  <fieldset class="char-table">
    @for (selected of selectedRows; track selected.i) {
      <p-checkbox
        class="char-row-check"
        [binary]="true"
        [ngModel]="selected.row.partial"
        [checkboxIcon]="selected.row.fully ? PrimeIcons.CHECK : PrimeIcons.MINUS"
        (click)="toggleRow(selected.row.chars, selected.row.fully)"
        readonly
      />
      @for (char of selected.row.chars; track char.j) {
        @if (char.char) {
          <p-toggleButton
            class="char-toggle"
            [onLabel]="char.char"
            [offLabel]="char.char"
            [ngModel]="char.selected"
            (onChange)="toggleCharacter(char.char)"
          />
        } @else {
          <div></div>
        }
      }
    }
  </fieldset>
</ng-template>
