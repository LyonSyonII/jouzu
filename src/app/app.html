<main>
  <nav>
    <h1>
      <ruby>上手<rt>じょうず</rt></ruby>
    </h1>

    <p-button
      size="large"
      [icon]="this.themeService.isDarkMode() ? PrimeIcons.SUN : PrimeIcons.MOON"
      (onClick)="this.themeService.toggleDarkMode()"
    />
  </nav>

  <div>
    <x-card
      header="かな・カナ"
      divider
      [tooltip]="{
        text: 'kana',
        options: romanizeTooltip,
      }"
    >
      <section>
        <h3 pTooltip="hiragana" [tooltipOptions]="romanizeTooltip">ひらがな</h3>

        <fieldset class="char-table">
          @for (charRow of hiragana; track charRow.i) {
            <p-checkbox class="char-row-check" (onChange)="charRow" />
              @for (char of charRow.row; track char.j) {
                @if (char.char) {
                  <p-togglebutton class="char-toggle" [onLabel]="char.char" [offLabel]="char.char" />
                } @else {
                  <div></div>
                }
              }
          }
        </fieldset>
        <!-- Add hiragana character list -->
      </section>
      <p-divider layout="vertical" />
      <section>
        <h3 pTooltip="katakana" [tooltipOptions]="romanizeTooltip">カタカナ</h3>
      </section>
    </x-card>
  </div>
</main>

<p-toast />
