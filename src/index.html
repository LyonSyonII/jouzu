<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>上手 - Jouzu</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Learn Japanese with real examples" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <style>
      :root {
        --app-bg-main: var(--p-surface-50, #fafafa);
        --app-text-main: var(--p-text-color, #18181b);
      }

      :root.dark {
        --app-bg-main: var(--p-surface-950, #09090b);
        --app-text-main: var(--p-text-color, #ffffff);
      }

      html,
      body {
        background-color: var(--app-bg-main);
        color: var(--app-text-main);
        margin: 0;
        padding: 0;
      }

      html {
        color-scheme: light;
      }
      html.dark {
        color-scheme: dark;
      }
    </style>

    <script>
      if (
        // check if user had saved dark as their
        // theme when accessing page before
        localStorage.theme === "dark" ||
        // or user's requesting dark color
        // scheme through operating system
        (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        // then if we have access to the document and the element
        // we add the dark class to the html element and
        // store the dark value in the localStorage
        if (document && document.documentElement) {
          document.documentElement.classList.add("dark");
          localStorage.setItem("theme", "dark");
        }
      } else {
        // else if we have access to the document and the element
        // we remove the dark class to the html element and
        // store the value light in the localStorage
        if (document && document.documentElement) {
          document.documentElement.classList.remove("dark");
          localStorage.setItem("theme", "light");
        }
      }
    </script>
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
