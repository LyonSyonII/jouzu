<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Jouzu</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Learn Japanese with real examples" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <style>
      :root {
        --app-bg-main: var(--p-surface-50, #fafafa);
        --app-text-main: var(--p-text-color, #18181b);
      }

      :root.dark-mode {
        --app-bg-main: var(--p-surface-950, #09090b);
        --app-text-main: var(--p-text-color, #ffffff);
      }

      html,
      body {
        background-color: var(--app-bg-main);
        color: var(--app-text-main);
        margin: 0;
        padding: 0;
      }

      html {
        color-scheme: light;
      }
      html.dark-mode {
        color-scheme: dark;
      }
    </style>

    <script>
      (function () {
        try {
          const theme = localStorage.getItem("theme-preference");
          if (
            theme === "dark" ||
            (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark-mode");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
